name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test · ${{ matrix.os }} · Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    env:
      PYTHONIOENCODING: utf-8
      QT_QPA_PLATFORM: offscreen
      SCIKMS_LOCALE: vi-VN

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install Ubuntu Qt offscreen libs
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libxkbcommon0 libxcb-cursor0 \
            libgl1 libopengl0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --dev --python ${{ matrix.python }}

      - name: Smoke-test the scikms import
        run: uv run python -c "import scikms; print('scikms', scikms.__version__)"

      - name: Run pytest
        run: uv run pytest -p no:faulthandler --no-cov
